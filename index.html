<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Medicina Interna - Farreras XX edición</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: #0a0c10;
            color: #e8edf2;
            padding: 2rem 1.5rem;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 15% 30%, rgba(30, 40, 60, 0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #a0b2c6 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .subhead {
            font-size: 0.9rem;
            color: #8a99b0;
            font-weight: 400;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .accent-bar {
            width: 80px;
            height: 3px;
            background: #2c6e9e;
            margin: 1rem auto 0;
            border-radius: 3px;
        }

        .pdf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.6rem;
        }

        .pdf-card {
            background: rgba(18, 22, 28, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.5);
        }

        .pdf-card:hover {
            transform: translateY(-5px);
            border-color: rgba(44, 110, 158, 0.5);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.6);
            background: rgba(22, 28, 36, 0.95);
        }

        .card-header {
            padding: 1.2rem 1.5rem 0.5rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .card-icon {
            font-size: 2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .section-number {
            font-size: 0.7rem;
            font-weight: 500;
            background: rgba(44, 110, 158, 0.3);
            color: #7eb6d4;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.3px;
        }

        .card-content {
            padding: 1rem 1.5rem 1.5rem 1.5rem;
            flex: 1;
        }

        .card-content h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.65rem;
            line-height: 1.4;
            color: #f0f4fa;
        }

        .card-content p {
            color: #9aaec5;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 1.2rem;
        }

        .btn-pdf {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(44, 110, 158, 0.2);
            border: 1px solid rgba(44, 110, 158, 0.5);
            color: #c0def5;
            text-decoration: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .btn-pdf:hover {
            background: #2c6e9e;
            color: white;
            border-color: #2c6e9e;
            box-shadow: 0 4px 12px rgba(44, 110, 158, 0.3);
        }

        footer {
            text-align: center;
            margin-top: 3.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.75rem;
            color: #5e6f8a;
        }

        .credits {
            margin-top: 0.8rem;
            font-size: 0.7rem;
            color: #6c7f9e;
            border-top: 1px dashed rgba(255,255,255,0.1);
            padding-top: 0.8rem;
            display: inline-block;
            width: auto;
        }

        .credits strong {
            color: #7eb6d4;
            font-weight: 500;
        }

        .credits a {
            color: #7eb6d4;
            text-decoration: none;
        }

        .credits a:hover {
            text-decoration: underline;
        }

        /* Botón flotante */
        .btn-flotante {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e2a3a;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(44, 110, 158, 0.5);
            color: #c0def5;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.8rem;
            transition: all 0.25s ease;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            text-decoration: none;
        }

        .btn-flotante:hover {
            background: #2c6e9e;
            color: white;
            transform: scale(1.05);
            border-color: #2c6e9e;
            box-shadow: 0 8px 20px rgba(44, 110, 158, 0.4);
        }

        .btn-flotante::after {
            content: "Volver arriba";
            position: absolute;
            right: 70px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            font-weight: 400;
        }

        .btn-flotante:hover::after {
            opacity: 1;
        }

        @media (max-width: 680px) {
            body {
                padding: 1rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .pdf-grid {
                grid-template-columns: 1fr;
            }
            .btn-flotante {
                bottom: 1.2rem;
                right: 1.2rem;
                width: 46px;
                height: 46px;
                font-size: 1.5rem;
            }
            .btn-flotante::after {
                display: none;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #14181f;
        }
        ::-webkit-scrollbar-thumb {
            background: #2c6e9e;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero" id="inicio">
        <h1>Medicina Interna<br><span style="font-size: 1.8rem;">Farreras · XX edición</span></h1>
        <div class="accent-bar"></div>
        <div class="subhead">Biblioteca digital · acceso directo a capítulos</div>
    </div>

    <div id="pdfListContainer" class="pdf-grid">
        <div style="text-align: center; grid-column: 1/-1; padding: 2rem;">Cargando secciones...</div>
    </div>

    <footer>
        <div>📁 Los archivos PDF se encuentran en la carpeta <code style="background:#1e2430; padding:2px 6px; border-radius:8px;">pdfs/</code></div>
        <div class="credits">
            ✨ Digitalización y estructuración: <strong>René Hernández Hernández</strong> · 
            <a href="mailto:renediana2014@gmail.com">renediana2014@gmail.com</a>
        </div>
        <div style="margin-top: 0.5rem;">© Farreras Rozman · Edición conmemorativa</div>
    </footer>
</div>

<!-- Botón flotante para volver arriba -->
<div class="btn-flotante" id="btnVolverArriba" aria-label="Volver al inicio">
    ↑
</div>

<script>
    // Datos de secciones (exactamente los que proporcionaste)
    const secciones = [
        { nombre: "Sección I. Fundamentos de la práctica médica", archivo: "s1.pdf", descripcion: "Principios, razonamiento clínico y ética médica." },
        { nombre: "Sección II. Enfermedades del aparato digestivo", archivo: "s2.pdf", descripcion: "Patología esofágica, gástrica, intestinal y hepática." },
        { nombre: "Sección III. Cardiología", archivo: "s3.pdf", descripcion: "Trastornos del corazón, arritmias, insuficiencia cardíaca." },
        { nombre: "Sección IV. Angiología", archivo: "s4.pdf", descripcion: "Enfermedades arteriales, venosas y linfáticas." },
        { nombre: "Sección V. Neumología", archivo: "s5.pdf", descripcion: "Patología pulmonar, EPOC, asma, fibrosis." },
        { nombre: "Sección VI. Nefrología", archivo: "s6.pdf", descripcion: "Insuficiencia renal, glomerulopatías, electrolitos." },
        { nombre: "Sección VII. Reumatología y enfermedades sistémicas", archivo: "s7.pdf", descripcion: "Artritis, lupus, vasculitis, colagenosis." },
        { nombre: "Sección VIII. Oncología médica", archivo: "s8.pdf", descripcion: "Cáncer, quimioterapia, cuidados paliativos." },
        { nombre: "Sección IX. Genética médica", archivo: "s9.pdf", descripcion: "Bases moleculares, enfermedades hereditarias." },
        { nombre: "Sección X. Geriatría", archivo: "s10.pdf", descripcion: "Anciano frágil, pluripatología, síndromes geriátricos." },
        { nombre: "Sección XI. Dermatología en medicina interna", archivo: "s11.pdf", descripcion: "Manifestaciones cutáneas de enfermedades sistémicas." },
        { nombre: "Sección XII. Neurología", archivo: "s12.pdf", descripcion: "Ictus, demencias, epilepsia, trastornos del movimiento." },
        { nombre: "Sección XIII. Psiquiatría", archivo: "s13.pdf", descripcion: "Depresión, ansiedad, psicosis en el paciente médico." },
        { nombre: "Sección XIV. Hematología", archivo: "s14.pdf", descripcion: "Anemias, leucemias, linfomas, coagulopatías." },
        { nombre: "Sección XV. Metabolismo y nutrición", archivo: "s15.pdf", descripcion: "Obesidad, desnutrición, vitaminas, metabolismo óseo." },
        { nombre: "Sección XVI. Endocrinología", archivo: "s16.pdf", descripcion: "Diabetes, tiroides, suprarrenales, hipófisis." },
        { nombre: "Sección XVII. Enfermedades infecciosas", archivo: "s17.pdf", descripcion: "Bacterianas, víricas, parasitarias, sepsis." },
        { nombre: "Sección XVIII. Toxicología clínica", archivo: "s18.pdf", descripcion: "Intoxicaciones, fármacos, metales pesados." },
        { nombre: "Sección XIX. Enfermedades causadas por agentes ambientales", archivo: "s19.pdf", descripcion: "Contaminación, radiación, exposición laboral." },
        { nombre: "Sección XX. Inmunología", archivo: "s20.pdf", descripcion: "Inmunodeficiencias, autoinmunidad, alergia." },
        { nombre: "Referencia y valores normales de las pruebas de laboratorio", archivo: "laboratorio.pdf", descripcion: "Parámetros bioquímicos, hematológicos y de orina." }
    ];

    function getSectionNumber(nombre) {
        const match = nombre.match(/Sección\s+([IVXLCDM]+|\d+)/i);
        if (match) return match[1].toUpperCase();
        if (nombre.includes("Referencia")) return "Apéndice";
        return "";
    }

    function renderizarPDFs() {
        const container = document.getElementById('pdfListContainer');
        if (!secciones.length) {
            container.innerHTML = `<div class="no-pdfs">⚠️ No hay secciones cargadas.</div>`;
            return;
        }

        let html = '';
        for (let item of secciones) {
            const pdfPath = `pdfs/${item.archivo}`;
            const desc = item.descripcion || "Documento académico de referencia.";
            let icono = "📘";
            if (item.nombre.includes("Cardiología")) icono = "❤️";
            else if (item.nombre.includes("Neurología")) icono = "🧠";
            else if (item.nombre.includes("Digestivo")) icono = "🫀";
            else if (item.nombre.includes("Laboratorio")) icono = "🔬";
            else if (item.nombre.includes("Oncología")) icono = "⚕️";
            
            const numSeccion = getSectionNumber(item.nombre);
            const badge = numSeccion ? `<span class="section-number">${numSeccion}</span>` : '';
            
            html += `
                <div class="pdf-card">
                    <div class="card-header">
                        <div class="card-icon">${icono}</div>
                        ${badge}
                    </div>
                    <div class="card-content">
                        <h3>${escapeHTML(item.nombre)}</h3>
                        <p>${escapeHTML(desc)}</p>
                        <a href="${pdfPath}" target="_self" class="btn-pdf">
                            📖 Abrir PDF
                            <span style="font-size:1rem;">→</span>
                        </a>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function escapeHTML(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Botón flotante
    function setupFloatingButton() {
        const btn = document.getElementById('btnVolverArriba');
        if (!btn) return;
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const inicio = document.getElementById('inicio');
            if (inicio) {
                inicio.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    }

    renderizarPDFs();
    setupFloatingButton();
</script>
</body>
</html>
