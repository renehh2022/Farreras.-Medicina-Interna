<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acerca de - Medicina Interna Farreras</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: #0a0c10;
            color: #e8edf2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h2 {
            color: #7eb6d4;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        p {
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }
        .email {
            color: #2c6e9e;
            font-weight: bold;
        }
        button {
            margin-top: 2rem;
            background: #2c6e9e;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        button:hover {
            background: #1f5a7e;
        }
        .version {
            font-size: 0.7rem;
            color: #6c7f9e;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="logo">📚</div>
    <h2>Medicina Interna - Farreras XX edición</h2>
    <p>Digitalización y estructuración:</p>
